name: CI/CD Pipeline

# Trigger this pipeline on every push or pull request targeting the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-run:
    name: Build and Run
    # Use the latest Ubuntu runner provided by GitHub Actions
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code so subsequent steps can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Go environment with the specified version
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Step 3: Run golangci-lint to catch code style and quality issues
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      # Step 4: Compile the Go project to ensure there are no build errors
      - name: Build
        run: go build -v ./...

      # Step 5: Run the application to verify it executes without runtime errors
      - name: Run
        run: go run main.go
